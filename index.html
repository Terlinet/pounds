<!DOCTYPE html>
<html>
<head>
  <base href="/pounds/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="TerlineT Pounds - Tradutor de Libras com Inteligência Artificial">

  <style>
    html, body {
      background-color: transparent !important;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
  </style>

  <!-- Open Graph / Facebook / WhatsApp -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://terlinet.github.io/pounds/">
  <meta property="og:title" content="TerlineT Pounds">
  <meta property="og:description" content="Tradutor de Libras em tempo real com mapeamento neural e síntese de voz.">
  <meta property="og:image" content="https://terlinet.github.io/pounds/assets/assets/img.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="TerlineT Pounds">
  <meta property="twitter:description" content="Tradutor de Libras em tempo real com mapeamento neural e síntese de voz.">
  <meta property="twitter:image" content="https://terlinet.github.io/pounds/assets/assets/img.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TerlineT Pounds">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon Emoji 👍🏽 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👍🏽</text></svg>">

  <title>TerlineT Pounds</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Elemento de Vídeo para Visualização em Tempo Real -->
  <video id="input_video" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; pointer-events: none;"></video>

  <!-- Scripts do MediaPipe para Processamento Neural (Holistic para Mãos + Corpo) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <script>
    let holistic;
    let camera;
    let poseCallback;
    const videoElement = document.getElementById('input_video');

    // Inicializa o Detector Holístico
    window.initPoseDetector = async function() {
      try {
        holistic = new Holistic({locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`;
        }});

        holistic.setOptions({
          modelComplexity: 1,
          smoothLandmarks: true,
          enableSegmentation: false,
          smoothSegmentation: false,
          refineFaceLandmarks: true,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5
        });

        holistic.onResults((results) => {
          // Combinamos Pose + Mãos para o Flutter
          const data = {
            pose: results.poseLandmarks || [],
            leftHand: results.leftHandLandmarks || [],
            rightHand: results.rightHandLandmarks || []
          };
          if (poseCallback) {
            poseCallback(JSON.stringify(data));
          }
        });

        return true;
      } catch (e) {
        console.error("Erro Holistic:", e);
        return false;
      }
    };

    window.startCamera = async function(facingMode) {
      if (camera) await camera.stop();

      videoElement.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';

      try {
        camera = new Camera(videoElement, {
          onFrame: async () => {
            await holistic.send({image: videoElement});
          },
          facingMode: facingMode,
          width: 1280,
          height: 720
        });
        await camera.start();
        return true;
      } catch (e) {
        return false;
      }
    };

    window.stopCamera = function() {
      if (camera) camera.stop();
      videoElement.srcObject = null;
    };

    window.setPoseCallback = function(callback) {
      poseCallback = callback;
    };

    window.captureFrame = function() { return ""; };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
