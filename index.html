<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/pounds/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="TerlineT Pounds - Tradutor de Libras com Inteligência Artificial">

  <!-- Open Graph / Facebook / WhatsApp -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://terlinet.github.io/pounds/">
  <meta property="og:title" content="TerlineT Pounds">
  <meta property="og:description" content="Tradutor de Libras em tempo real com mapeamento neural e síntese de voz.">
  <meta property="og:image" content="https://terlinet.github.io/pounds/assets/assets/img.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="TerlineT Pounds">
  <meta property="twitter:description" content="Tradutor de Libras em tempo real com mapeamento neural e síntese de voz.">
  <meta property="twitter:image" content="https://terlinet.github.io/pounds/assets/assets/img.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TerlineT Pounds">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon Emoji 👍🏽 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👍🏽</text></svg>">

  <title>TerlineT Pounds</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Elemento de Vídeo para Visualização em Tempo Real -->
  <video id="input_video" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1;"></video>

  <!-- Scripts do MediaPipe para Processamento Neural -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <script>
    let pose;
    let camera;
    let poseCallback;
    const videoElement = document.getElementById('input_video');

    // Inicializa o Detector de Pose
    window.initPoseDetector = async function() {
      try {
        pose = new Pose({locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }});

        pose.setOptions({
          modelComplexity: 1,
          smoothLandmarks: true,
          enableSegmentation: false,
          smoothSegmentation: false,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5
        });

        pose.onResults((results) => {
          if (results.poseLandmarks && poseCallback) {
            poseCallback(JSON.stringify(results.poseLandmarks));
          }
        });

        return true;
      } catch (e) {
        console.error("Erro ao inicializar Pose:", e);
        return false;
      }
    };

    // Inicia a Câmera
    window.startCamera = async function(facingMode) {
      if (camera) {
        await camera.stop();
      }

      // Aplica espelhamento apenas se for a câmera frontal (user)
      if (facingMode === 'user') {
        videoElement.style.transform = 'scaleX(-1)';
      } else {
        videoElement.style.transform = 'scaleX(1)';
      }

      try {
        camera = new Camera(videoElement, {
          onFrame: async () => {
            await pose.send({image: videoElement});
          },
          facingMode: facingMode,
          width: 1280,
          height: 720
        });
        await camera.start();
        return true;
      } catch (e) {
        console.error("Erro Câmera:", e);
        return false;
      }
    };

    window.stopCamera = function() {
      if (camera) {
        camera.stop();
      }
      videoElement.srcObject = null;
    };

    window.setPoseCallback = function(callback) {
      poseCallback = callback;
    };

    window.captureFrame = function() {
      return "";
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
