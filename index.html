  <!-- Favicon Emoji 👍🏽 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👍🏽</text></svg>">

  <title>TerlineT Pounds</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <video id="input_video" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; pointer-events: none;" autoplay playsinline muted></video>

  <!-- Google MediaPipe Tasks Vision -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0" crossorigin="anonymous"></script>

  <script type="module">
    import { GestureRecognizer, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

    let gestureRecognizer;
    let camera;
    let poseCallback;
    const videoElement = document.getElementById('input_video');

    window.initPoseDetector = async function() {
      try {
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
        );
        gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          numHands: 2
        });
        return true;
      } catch (e) {
        console.error("Erro Gestos:", e);
        return false;
      }
    };

    window.startCamera = async function(facingMode) {
      videoElement.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';

      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facingMode, width: 1280, height: 720 }
      });
      videoElement.srcObject = stream;

      function predict() {
        if (gestureRecognizer && videoElement.readyState >= 2) {
          const results = gestureRecognizer.recognizeForVideo(videoElement, Date.now());
          if (poseCallback) {
            const data = {
              gesture: results.gestures.length > 0 ? results.gestures[0][0].categoryName : "",
              hands: results.landmarks || []
            };
            poseCallback(JSON.stringify(data));
          }
        }
        requestAnimationFrame(predict);
      }
      predict();
      return true;
    };

    window.setPoseCallback = function(callback) { poseCallback = callback; };
    window.stopCamera = function() {
      if (videoElement.srcObject) {
        videoElement.srcObject.getTracks().forEach(t => t.stop());
      }
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
